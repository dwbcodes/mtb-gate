openapi: 3.0.0
info:
  title: MTB Gate REST API
  version: 2.0.0
  description: |
    REST API served by every MTB Gate device for configuration, status,
    rider management, runs/results, calibration, peer (ESP-Now) tools,
    and on-device storage. All endpoints return JSON. No authentication
    (closed network). The AP SSID always equals the device ID
    (Gate-<#>-<mac>); the AP IP is 192.168.4.<gateNumber>.

servers:
  - url: http://192.168.4.1/api
    description: Start gate API (via its Wi-Fi AP; other gates are 192.168.4.<gateNumber>)

paths:
  /status:
    get:
      tags: [Status]
      summary: Get device status
      description: Identity, uptime, network state, ESP-Now link state, and the live run queue.
      operationId: getStatus
      responses:
        '200':
          description: Device status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceStatus'
      x-serial-command: api status

  /config:
    get:
      tags: [Configuration]
      summary: Get device configuration
      description: Full configuration; passwords redacted as "***".
      operationId: getConfig
      responses:
        '200':
          description: Device configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceConfig'
      x-serial-command: api config

  /config/wifi:
    put:
      tags: [Configuration]
      summary: Update Wi-Fi configuration
      description: |
        Update AP password, station credentials, and Wi-Fi channel.
        The AP SSID is not configurable (always equals deviceId).
        Networking restarts after the response is sent.
      operationId: putConfigWifi
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WiFiConfig'
      responses:
        '200': { $ref: '#/components/responses/SuccessResponse' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
      x-serial-command: api config/wifi <json>

  /config/mac:
    put:
      tags: [Configuration]
      summary: Update gate number and peer MAC
      description: |
        Role, deviceId, deviceLabel, and AP SSID are all derived from
        gateNumber (1 = start, 12 = finish, else intermediate).
        Saving reboots the device.
      operationId: putConfigMac
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MacConfig'
      responses:
        '200':
          description: Saved; device is rebooting
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RebootingResponse'
        '400': { $ref: '#/components/responses/ErrorResponse' }
      x-serial-command: api config/mac <json>

  /config/time:
    put:
      tags: [Configuration]
      summary: Update sensor trigger calibration
      description: |
        Sets the active baseline-relative trigger delta. A trigger fires when
        the sensor reading deviates from the rolling baseline by more than
        triggerDelta volts in either direction. Legacy absolute threshold
        fields are accepted and stored but are not the active trigger path.
      operationId: putConfigTime
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TimeConfig'
      responses:
        '200': { $ref: '#/components/responses/SuccessResponse' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
      x-serial-command: api config/time <json>

  /reboot:
    post:
      tags: [System]
      summary: Reboot the device
      operationId: postReboot
      responses:
        '200': { $ref: '#/components/responses/SuccessResponse' }
      x-serial-command: reboot

  /riders:
    get:
      tags: [Riders]
      summary: List all riders
      description: Registered riders (max 32 per device).
      operationId: getRiders
      responses:
        '200':
          description: List of riders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RiderEntry'
      x-serial-command: api riders
    post:
      tags: [Riders]
      summary: Register or update rider
      description: |
        Upsert by tagId. Changes are broadcast to peer gates over ESP-Now.
        When the roster is full (32), a new tag is silently ignored.
      operationId: postRiders
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RiderInput'
      responses:
        '200': { $ref: '#/components/responses/SuccessResponse' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
      x-serial-command: api riders/add <json>
    delete:
      tags: [Riders]
      summary: Remove rider
      description: |
        tagId may be a query parameter (?tagId=...) or a JSON body field.
        Idempotent — deleting an unknown tag still returns ok.
      operationId: deleteRiders
      parameters:
        - name: tagId
          in: query
          required: false
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RiderDelete'
      responses:
        '200': { $ref: '#/components/responses/SuccessResponse' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
      x-serial-command: api riders/delete <json>

  /results:
    get:
      tags: [Runs]
      summary: List results (live queue + persisted runs)
      description: Live runs first, then persisted summaries newest-first; each entry carries a "live" flag.
      operationId: getResults
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 20, minimum: 1, maximum: 50 }
      responses:
        '200':
          description: Merged results array
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ResultEntry'
    post:
      tags: [Runs]
      summary: Start a run for a registered rider
      description: Start gate only. Re-scanning the active rider's tag cancels their run instead.
      operationId: postResults
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tagId: { type: string, example: 04AB12CD }
              required: [tagId]
      responses:
        '200':
          description: Run started (or previous run cancelled by re-scan)
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '409':
          description: Not the start gate
    delete:
      tags: [Runs]
      summary: Delete a run (live or persisted)
      operationId: deleteResults
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                runId: { type: string }
              required: [runId]
      responses:
        '200': { $ref: '#/components/responses/SuccessResponse' }
        '404':
          description: Run not found

  /results/stop:
    post:
      tags: [Runs]
      summary: Cancel the active run
      operationId: postResultsStop
      responses:
        '200': { $ref: '#/components/responses/SuccessResponse' }
        '409':
          description: No active run

  /runs:
    get:
      tags: [Runs]
      summary: Persisted run summaries
      description: Newest first across sessions; max 50.
      operationId: getRuns
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 50, minimum: 1, maximum: 50 }
      responses:
        '200':
          description: Array of run summaries
      x-serial-command: api runs

  /events:
    get:
      tags: [Runs]
      summary: Current-session event log
      operationId: getEvents
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 50, minimum: 1, maximum: 50 }
      responses:
        '200':
          description: Array of event records

  /ping:
    post:
      tags: [Peer]
      summary: API liveness check
      description: Returns {"ok":true,"sent":false}; does not touch the radio. Use /peer/* for real link tests.
      operationId: postPing
      responses:
        '200': { $ref: '#/components/responses/SuccessResponse' }
      x-serial-command: api ping

  /peer/ping:
    post:
      tags: [Peer]
      summary: Broadcast an ESP-Now discovery ping (start gate only)
      operationId: postPeerPing
      responses:
        '200': { $ref: '#/components/responses/SuccessResponse' }
        '409':
          description: Start gate only / ESP-Now not ready

  /peer/test:
    post:
      tags: [Peer]
      summary: Test the peer link
      description: Sends a clock-sync request and returns RTT, reachability, and clock state.
      operationId: postPeerTest
      responses:
        '200':
          description: Link report
        '409':
          description: ESP-Now not ready

  /peer/sync:
    post:
      tags: [Peer]
      summary: Request a clock sync with the peer (start gate only)
      operationId: postPeerSync
      responses:
        '200': { $ref: '#/components/responses/SuccessResponse' }
        '409':
          description: Start gate only / ESP-Now not ready / no peer

  /peer/clock:
    get:
      tags: [Peer]
      summary: Read clock-sync state
      operationId: getPeerClock
      responses:
        '200':
          description: Clock offset, RTT, and sync age
    post:
      tags: [Peer]
      summary: Request a clock sync and return last known sync data (start gate only)
      operationId: postPeerClock
      responses:
        '200':
          description: Sync requested; last known values returned
        '409':
          description: Start gate only / ESP-Now not ready

  /peer/riders/sync:
    post:
      tags: [Peer]
      summary: Re-broadcast the rider roster to peer gates (start gate only)
      operationId: postPeerRidersSync
      responses:
        '200': { $ref: '#/components/responses/SuccessResponse' }
        '409':
          description: Start gate only / ESP-Now not ready

  /storage:
    get:
      tags: [Storage]
      summary: Filesystem usage and current session number
      operationId: getStorage
      responses:
        '200':
          description: totalBytes / usedBytes / freeBytes / currentSession
      x-serial-command: api storage

  /storage/prune:
    post:
      tags: [Storage]
      summary: Prune old sessions (keeps latest 5)
      operationId: postStoragePrune
      responses:
        '200':
          description: Storage report after pruning

  /sessions:
    get:
      tags: [Storage]
      summary: List recorded sessions with manifests and sync status
      operationId: getSessions
      responses:
        '200':
          description: Array of session descriptors

  /sessions/file:
    get:
      tags: [Storage]
      summary: Fetch a session file
      operationId: getSessionFile
      parameters:
        - name: num
          in: query
          required: true
          schema: { type: integer }
        - name: file
          in: query
          required: true
          schema: { type: string, enum: [events.jsonl, runs.jsonl, manifest.json, sync.json] }
      responses:
        '200':
          description: File contents
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '404':
          description: File not found

  /files:
    get:
      tags: [Storage]
      summary: Browse the device filesystem
      operationId: getFiles
      parameters:
        - name: path
          in: query
          schema: { type: string, default: / }
      responses:
        '200':
          description: Directory listing
        '404':
          description: Path not found

  /files/view:
    get:
      tags: [Storage]
      summary: View a file (truncated at 24 KB)
      operationId: getFileView
      parameters:
        - name: path
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          description: File contents (X-File-Truncated header signals truncation)
        '404':
          description: File not found

  /nfc/listen:
    post:
      tags: [NFC]
      summary: Open a 15-second NFC listen window
      operationId: postNfcListen
      responses:
        '200': { $ref: '#/components/responses/SuccessResponse' }
        '503':
          description: NFC reader not detected

  /nfc/tag:
    get:
      tags: [NFC]
      summary: Poll for the tag scanned during the listen window
      operationId: getNfcTag
      responses:
        '200':
          description: '{"ok":true,"tagId":"..."} or {"ok":false,"tagId":null}'

  /nfc/diagnostics:
    get:
      tags: [NFC]
      summary: NFC reader init state and wiring hints
      operationId: getNfcDiagnostics
      responses:
        '200':
          description: Initialized flag and message

  /i2c/scan:
    get:
      tags: [NFC]
      summary: Scan the I2C bus for devices
      operationId: getI2cScan
      responses:
        '200':
          description: Detected I2C addresses

components:
  schemas:
    SuccessResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
      required: [ok]

    RebootingResponse:
      type: object
      properties:
        ok: { type: boolean, example: true }
        rebooting: { type: boolean, example: true }
      required: [ok]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: wifiChannel must be 1-13
      required: [error]

    DeviceStatus:
      type: object
      properties:
        deviceId:
          type: string
          example: Gate-Start-a1b2c3d4e5f6
          description: Gate-<#>-<mac>; gate 1 renders as Gate-Start-<mac>, gate 12 as Gate-Finish-<mac>. Also the AP SSID.
        deviceLabel:
          type: string
          example: Gate Start
        role:
          type: string
          enum: [start, finish, intermediate]
          description: Derived from gateNumber
        mac:
          type: string
          example: 'DC:B4:D9:9C:48:EC'
        uptimeMs:
          type: integer
          example: 234567
        apSsid:
          type: string
          example: Gate-Start-a1b2c3d4e5f6
          description: Always equals deviceId
        apIp:
          type: string
          example: 192.168.4.1
          description: 192.168.4.<gateNumber>
        staSsid:
          type: string
          example: ''
        staIp:
          type: string
          example: 0.0.0.0
        startThreshold: { type: number, format: float, description: Legacy; not the active trigger path }
        finishThreshold: { type: number, format: float, description: Legacy; not the active trigger path }
        line2Threshold: { type: number, format: float, description: Legacy; not the active trigger path }
        triggerDelta:
          type: number
          format: float
          example: 0.30
          description: Active trigger delta (volts from rolling baseline)
        espNow:
          type: object
          properties:
            configured: { type: boolean, description: True once a peer MAC is set }
            peerMac: { type: string, example: '0C:4E:A0:66:A4:14' }
            lastRttMs: { type: integer, description: Last clock-sync round-trip (start gate) }
            lastSyncAgoMs: { type: integer, description: ms since last completed sync; -1 = never }
            reachable: { type: boolean, description: Sync completed within the last 60 s }
            wifiChannel: { type: integer }
        queue:
          type: array
          description: Live runs with per-run metrics (null until both timestamps exist)
          items:
            $ref: '#/components/schemas/QueueEntry'

    QueueEntry:
      type: object
      properties:
        runId: { type: string }
        riderId: { type: string, example: rider-04AB12CD }
        riderName: { type: string, example: Dave Wilson }
        status:
          type: string
          enum: [Queued, Countdown, AwaitingStart, OnCourse, Finished, TimedOut, Cancelled]
        metrics:
          type: object
          properties:
            reactionMs: { type: integer, nullable: true, description: GO -> line1 }
            launchMs: { type: integer, nullable: true, description: line1 -> line2 }
            courseMs: { type: integer, nullable: true, description: line1 -> finish }

    ResultEntry:
      type: object
      description: Queue entry or persisted run summary; "live" distinguishes them.
      properties:
        runId: { type: string }
        riderId: { type: string }
        riderName: { type: string }
        status: { type: string }
        live: { type: boolean }
        reactionMs: { type: integer, nullable: true }
        launchMs: { type: integer, nullable: true }
        courseMs: { type: integer, nullable: true }
        falseStart: { type: boolean }
        completedAtMs: { type: integer }

    DeviceConfig:
      type: object
      properties:
        deviceId:
          type: string
          example: Gate-Start-a1b2c3d4e5f6
          description: Derived from gateNumber + eFuse MAC (read-only)
        deviceLabel:
          type: string
          example: Gate Start
          description: Derived from gateNumber
        gateNumber:
          type: integer
          minimum: 1
          maximum: 254
          example: 1
          description: 'Source of truth: 1 = start, 12 = finish, else intermediate'
        role:
          type: string
          enum: [start, finish, intermediate]
          description: Derived from gateNumber (read-only)
        apPassword:
          type: string
          example: '***'
          description: Always returned as ***
        staSsid:
          type: string
          example: MyNetwork
        staPassword:
          type: string
          example: '***'
          description: Always returned as ***
        startThreshold: { type: number, format: float, description: Legacy; not the active trigger path }
        line2Threshold: { type: number, format: float, description: Legacy; not the active trigger path }
        finishThreshold: { type: number, format: float, description: Legacy; not the active trigger path }
        triggerDelta:
          type: number
          format: float
          example: 0.30
          minimum: 0.01
          maximum: 2.0
          description: Active trigger delta in volts from the rolling baseline
        wifiChannel:
          type: integer
          minimum: 1
          maximum: 13
        peerMac:
          type: string
          example: '0C:4E:A0:66:A4:14'
          pattern: '^([0-9a-fA-F]{2}:){5}([0-9a-fA-F]{2})$|^$'
          description: 'Peer gate MAC (empty = auto-discover)'

    WiFiConfig:
      type: object
      description: Omitted fields are left unchanged. AP SSID is not configurable.
      properties:
        apPassword:
          type: string
          description: Empty (open AP) or >= 8 chars
        staSsid:
          type: string
          description: Station network SSID (empty = don't join)
        staPassword:
          type: string
        wifiChannel:
          type: integer
          minimum: 1
          maximum: 13

    MacConfig:
      type: object
      description: Omitted fields are left unchanged. Saving reboots the device.
      properties:
        gateNumber:
          type: integer
          minimum: 1
          maximum: 254
          description: 1 = start, 12 = finish, else intermediate; drives role/deviceId/label/AP
        peerMac:
          type: string
          pattern: '^([0-9a-fA-F]{2}:){5}([0-9a-fA-F]{2})$|^$'
          description: 'Peer MAC (AA:BB:CC:DD:EE:FF) or empty for auto-discover'

    TimeConfig:
      type: object
      properties:
        triggerDelta:
          type: number
          format: float
          minimum: 0.01
          maximum: 2.0
          description: Active trigger delta in volts from the rolling baseline
        startThreshold: { type: number, format: float, minimum: 0.0, maximum: 2.0, description: Legacy; stored but inactive }
        line2Threshold: { type: number, format: float, minimum: 0.0, maximum: 2.0, description: Legacy; stored but inactive }
        finishThreshold: { type: number, format: float, minimum: 0.0, maximum: 2.0, description: Legacy; stored but inactive }

    RiderEntry:
      type: object
      properties:
        riderId:
          type: string
          example: rider-04AB12CD
          description: 'Always rider-<tagId> (read-only)'
        displayName:
          type: string
          example: Dave Wilson
        tagId:
          type: string
          example: 04AB12CD
          description: NFC tag UID (hex)
      required: [riderId, displayName, tagId]

    RiderInput:
      type: object
      properties:
        tagId:
          type: string
          example: 04AB12CD
        displayName:
          type: string
          example: Dave Wilson
      required: [tagId, displayName]

    RiderDelete:
      type: object
      properties:
        tagId:
          type: string
          example: 04AB12CD
      required: [tagId]

  responses:
    SuccessResponse:
      description: Operation successful
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SuccessResponse'

    ErrorResponse:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

tags:
  - name: Status
  - name: Configuration
  - name: System
  - name: Riders
  - name: Runs
  - name: Peer
  - name: Storage
  - name: NFC
